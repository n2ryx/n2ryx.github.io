fps_max "600"
cl_showfps "1"
sensitivity "1"

viewmodel_fov "68"
viewmodel_offset_x "2.5"
viewmodel_offset_y "0"
viewmodel_offset_z "-1.5"
viewmodel_presetpos "3"

// 准星
cl_crosshairstyle 4  // 准星风格
cl_crosshairdot 0 // 中心点
cl_crosshairsize 1  // 长度
cl_crosshairthickness 1  // 粗细
cl_crosshairgap -4 // 间隙
cl_crosshair_outlinethickness 0  // 轮廓
cl_crosshaircolor_r 0  // 红色
cl_crosshaircolor_g 255  // 绿色
cl_crosshaircolor_b 255  // 蓝色
cl_crosshair_alpha 255  // 透明度
cl_crosshair_t 0 // T形准星
cl_crosshair_recoil 0 // 跟随后坐力
cl_crosshairgap_useweaponvalue 0 // 准星间距设置
cl_crosshair_friendly_warning  0  // 准星友军伤害警告

// HUB
hud_scaling "1"  // HUD比例
cl_hud_color "10"  // HUD颜色

// 雷达
cl_radar_always_centered 0 // 雷达保持玩家居中
cl_radar_rotate 1 // 雷达旋转
cl_radar_transparent 1  // 雷达HUD地图与背景融合
cl_radar_blur_background 1  // 模糊背景
cl_radar_background_alpha 0.6  // 雷达HUD背景透明度
cl_hud_radar_scale 1  // 雷达HUD大小
cl_radar_scale 0.4  // 雷达地图缩放
cl_radar_zoom_switch_scale 1.0  // 雷达地图切换缩放
cl_scoreboard_show_avatars 1  // 切换计分板方形外观
cl_scoreboard_force_square_avatars 0  // 强制方形外观
cl_radar_dynamic_scaling 0  // 雷达动态缩放

// Bind keyboard
bind "4" "slot6"
bind "6" "radio"
bind "z" "slot10"
bind "x" "slot8"
bind "c" "slot7"
bind "v" "slot9"
bind "mwheeldown" "+jump"
bind "mouse5" "+voicerecord"
bind "capslock" "toggleradarscale"
